<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClientVault — CRM</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #020c14;
      --bg1: #061422;
      --bg2: #081c2e;
      --bg3: #0b2540;
      --b0: #0d2e4a;
      --b1: #0f3d5e;
      --b2: #155070;
      --blue: #0a84ff;
      --blue2: #3da8ff;
      --blue3: #6ec3ff;
      --green: #00e5a0;
      --green2: #00c285;
      --green3: #7fffd4;
      --txt: #ddf0ff;
      --txt2: #7ab3cc;
      --txt3: #3d6a85;
      --red: #ff3d5a;
      --gold: #ffc040;
      --r: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─ animated bg ─ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 20%, rgba(10, 132, 255, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 80%, rgba(0, 229, 160, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from {
        opacity: .7
      }

      to {
        opacity: 1
      }
    }

    /* grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(10, 132, 255, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10, 132, 255, .025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─ HEADER ─ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(2, 12, 20, 0.92);
      border-bottom: 1px solid var(--b0);
      backdrop-filter: blur(16px);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--blue2), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo em {
      font-style: normal;
      -webkit-text-fill-color: var(--green);
    }

    .hbadge {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--txt3);
      border: 1px solid var(--b0);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ─ MAIN ─ */
    main {
      position: relative;
      z-index: 5;
      max-width: 1260px;
      margin: 0 auto;
      padding: 36px 32px;
    }

    /* ─ CONTROLS ─ */
    .controls {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--txt3);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg1);
      border: 1px solid var(--b0);
      border-radius: var(--r);
      padding: 13px 16px 13px 48px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--txt);
      outline: none;
      transition: all .25s;
    }

    .search-input::placeholder {
      color: var(--txt3);
    }

    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, .15), 0 0 24px rgba(10, 132, 255, .08);
    }

    .btn-primary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      background: linear-gradient(135deg, var(--blue), #0060cc);
      border: none;
      border-radius: var(--r);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: .3px;
      transition: all .25s;
      box-shadow: 0 4px 20px rgba(10, 132, 255, .4);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--blue2), var(--blue));
      box-shadow: 0 6px 28px rgba(10, 132, 255, .6);
      transform: translateY(-1px);
    }

    /* ─ STATS ─ */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat {
      background: var(--bg1);
      border: 1px solid var(--b0);
      border-radius: 14px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all .3s;
      position: relative;
      overflow: hidden;
    }

    .stat::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--c, var(--blue)), transparent);
    }

    .stat:hover {
      border-color: var(--b2);
      transform: translateY(-2px);
    }

    .stat-ico {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, .05);
    }

    .stat-v {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-l {
      font-size: 11px;
      color: var(--txt3);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ─ TABLE CARD ─ */
    .card {
      background: var(--bg1);
      border: 1px solid var(--b0);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-head {
      padding: 16px 24px;
      border-bottom: 1px solid var(--b0);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, .15);
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--txt2);
    }

    .badge {
      font-size: 11px;
      color: var(--blue2);
      background: rgba(10, 132, 255, .1);
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid rgba(10, 132, 255, .2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 12px 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--txt3);
      border-bottom: 1px solid var(--b0);
      background: rgba(0, 0, 0, .2);
    }

    tbody tr {
      border-bottom: 1px solid rgba(13, 46, 74, .4);
      transition: background .2s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: linear-gradient(90deg, rgba(10, 132, 255, .05), rgba(0, 229, 160, .03));
    }

    td {
      padding: 14px 20px;
      vertical-align: middle;
    }

    /* client cell – name / phone / address stacked */
    .client-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .av {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .av0 {
      background: linear-gradient(135deg, #0a3a7a, #0a84ff);
      color: #fff;
    }

    .av1 {
      background: linear-gradient(135deg, #004d36, #00e5a0);
      color: #000;
    }

    .av2 {
      background: linear-gradient(135deg, #5a1a80, #a855f7);
      color: #fff;
    }

    .av3 {
      background: linear-gradient(135deg, #7a3000, #f97316);
      color: #fff;
    }

    .av4 {
      background: linear-gradient(135deg, #7a1020, #ff3d5a);
      color: #fff;
    }

    .av5 {
      background: linear-gradient(135deg, #0d5252, #22d3ee);
      color: #000;
    }

    .cname {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
    }

    .cphone {
      font-size: 12px;
      color: var(--txt2);
      margin-top: 2px;
    }

    .caddr {
      font-size: 11px;
      color: var(--txt3);
      margin-top: 1px;
    }

    .date-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 13px;
      background: rgba(0, 229, 160, .07);
      border: 1px solid rgba(0, 229, 160, .22);
      border-radius: 20px;
      color: var(--green);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .25s;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }

    .date-btn:hover {
      background: rgba(0, 229, 160, .18);
      border-color: var(--green);
      box-shadow: 0 0 14px rgba(0, 229, 160, .28);
      transform: translateX(2px);
    }

    .acts {
      display: flex;
      gap: 7px;
    }

    .ibtn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--b0);
      background: none;
      cursor: pointer;
      transition: all .2s;
      color: var(--txt3);
    }

    .ibtn.e:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(10, 132, 255, .1);
    }

    .ibtn.d:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(255, 61, 90, .1);
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--txt3);
    }

    .empty svg {
      opacity: .25;
      margin-bottom: 12px;
    }

    /* ─ MODAL OVERLAY ─ */
    .ov {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(2, 12, 20, .88);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .ov.on {
      display: flex;
      animation: fIn .2s ease;
    }

    @keyframes fIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--b2);
      border-radius: 18px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      position: relative;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .8), 0 0 60px rgba(10, 132, 255, .07);
      animation: sUp .25s ease;
    }

    @keyframes sUp {
      from {
        transform: translateY(18px);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    .modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 22px;
      background: linear-gradient(90deg, var(--blue2), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .xbtn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--b0);
      background: none;
      color: var(--txt3);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .xbtn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .fgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .fg {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fg.full {
      grid-column: 1/-1;
    }

    .fl {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--txt3);
      font-weight: 600;
    }

    .fi {
      background: rgba(0, 0, 0, .35);
      border: 1px solid var(--b0);
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 13px;
      color: var(--txt);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all .25s;
    }

    .fi:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, .12);
    }

    .fi::placeholder {
      color: var(--txt3);
    }

    .btn-save {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--blue), #004fb3);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all .3s;
      letter-spacing: .4px;
      box-shadow: 0 4px 20px rgba(10, 132, 255, .4);
    }

    .btn-save:hover {
      background: linear-gradient(135deg, var(--blue2), var(--blue));
      box-shadow: 0 6px 28px rgba(10, 132, 255, .6);
      transform: translateY(-1px);
    }

    /* ─ HISTORY OVERLAY ─ */
    .hov {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(2, 12, 20, .93);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .hov.on {
      display: flex;
      animation: fIn .2s ease;
    }

    .hmod {
      background: var(--bg1);
      border: 1px solid var(--b2);
      border-radius: 20px;
      width: 100%;
      max-width: 820px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 50px 120px rgba(0, 0, 0, .85), 0 0 80px rgba(0, 229, 160, .05);
      animation: sUp .25s ease;
      position: relative;
      overflow: hidden;
    }

    /* top glow strip */
    .hmod::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), var(--blue), transparent);
    }

    .hhead {
      padding: 26px 28px 20px;
      border-bottom: 1px solid var(--b0);
      background: linear-gradient(135deg, rgba(0, 229, 160, .04), rgba(10, 132, 255, .04));
      flex-shrink: 0;
    }

    .hclient {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .hav {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
    }

    .hname {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .hphone {
      font-size: 12px;
      color: var(--txt2);
      margin-top: 3px;
    }

    .haddr {
      font-size: 11px;
      color: var(--txt3);
      margin-top: 1px;
    }

    .hstats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .hs {
      background: rgba(0, 0, 0, .3);
      border: 1px solid var(--b0);
      border-radius: 10px;
      padding: 10px 14px;
    }

    .hs-v {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }

    .hs-v.g {
      color: var(--green);
    }

    .hs-v.b {
      color: var(--blue2);
    }

    .hs-v.go {
      color: var(--gold);
    }

    .hs-l {
      font-size: 10px;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* add purchase section */
    .addp-wrap {
      padding: 16px 28px;
      border-bottom: 1px solid var(--b0);
      background: rgba(0, 0, 0, .1);
      flex-shrink: 0;
    }

    .addp-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--blue2);
      cursor: pointer;
      font-weight: 600;
      transition: color .2s;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .addp-toggle:hover {
      color: var(--green);
    }

    .addp-form {
      display: none;
      margin-top: 13px;
    }

    .addp-form.open {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .addp-form .fg .fi {
      padding: 8px 11px;
      font-size: 13px;
    }

    .btn-ap {
      padding: 9px 16px;
      background: linear-gradient(135deg, var(--green), var(--green2));
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 12px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      box-shadow: 0 3px 14px rgba(0, 229, 160, .35);
      letter-spacing: .3px;
    }

    .btn-ap:hover {
      box-shadow: 0 5px 22px rgba(0, 229, 160, .6);
      transform: translateY(-1px);
    }

    /* purchase list */
    .hbody {
      overflow-y: auto;
      flex: 1;
    }

    .hbody::-webkit-scrollbar {
      width: 3px;
    }

    .hbody::-webkit-scrollbar-thumb {
      background: var(--b2);
      border-radius: 2px;
    }

    .ptable {
      width: 100%;
      border-collapse: collapse;
    }

    .ptable thead th {
      text-align: left;
      padding: 11px 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--txt3);
      border-bottom: 1px solid var(--b0);
      background: rgba(0, 0, 0, .25);
      position: sticky;
      top: 0;
    }

    .ptable tbody tr {
      border-bottom: 1px solid rgba(13, 46, 74, .35);
      transition: background .2s;
    }

    .ptable tbody tr:last-child {
      border-bottom: none;
    }

    .ptable tbody tr:hover {
      background: rgba(10, 132, 255, .04);
    }

    .ptable td {
      padding: 13px 20px;
      font-size: 13px;
      vertical-align: middle;
    }

    .p-num {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(10, 132, 255, .1);
      border: 1px solid rgba(10, 132, 255, .18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--blue2);
    }

    .p-prod {
      font-weight: 500;
      font-size: 13px;
    }

    .p-date {
      font-size: 11px;
      color: var(--txt3);
      margin-top: 2px;
    }

    .p-qty {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      padding: 2px 8px;
      background: rgba(0, 229, 160, .08);
      border: 1px solid rgba(0, 229, 160, .2);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--green3);
    }

    .p-price {
      color: var(--txt2);
      font-size: 13px;
    }

    .p-total {
      font-family: 'Orbitron', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
    }

    .p-del {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: none;
      color: var(--txt3);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .p-del:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(255, 61, 90, .1);
    }

    .no-p {
      text-align: center;
      padding: 48px;
      color: var(--txt3);
      font-size: 13px;
    }

    /* highlight matches */
    .hl {
      color: var(--blue2);
      font-weight: 700;
    }

    @media(max-width:760px) {
      main {
        padding: 20px 14px;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }

      thead th:nth-child(4),
      td:nth-child(4) {
        display: none;
      }

      header {
        padding: 0 18px;
      }

      .addp-form.open {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto;
      }

      .addp-form.open .btn-ap {
        grid-column: 1/-1;
      }

      .hstats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <header>
    <div class="logo">Client<em>Vault</em></div>
  </header>

  <main>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrap">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input class="search-input" id="srch" placeholder="Search by client name or phone number…">
      </div>
      <button class="btn-primary" onclick="openAdd()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
        Add Client
      </button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat" style="--c:var(--blue)">
        <div class="stat-ico">👥</div>
        <div>
          <div class="stat-v" id="sC">0</div>
          <div class="stat-l">Clients</div>
        </div>
      </div>
      <div class="stat" style="--c:var(--green)">
        <div class="stat-ico">💰</div>
        <div>
          <div class="stat-v" id="sR">₹0</div>
          <div class="stat-l">Revenue</div>
        </div>
      </div>
      <div class="stat" style="--c:var(--gold)">
        <div class="stat-ico">🛒</div>
        <div>
          <div class="stat-v" id="sP">0</div>
          <div class="stat-l">Purchases</div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Client Directory</span>
        <span class="badge" id="rCount">0 clients</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Last Purchase</th>
            <th>Total Spent</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty">
        <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <p>No clients yet. Click <strong>Add Client</strong> to get started.</p>
      </div>
    </div>

  </main>

  <!-- ─ Add/Edit Modal ─ -->
  <div class="ov" id="cModal">
    <div class="modal">
      <div class="modal-title" id="mTitle">Add New Client</div>
      <button class="xbtn" onclick="closeModal('cModal')">&times;</button>
      <div class="fgrid">
        <div class="fg full">
          <label class="fl">Full Name</label>
          <input class="fi" id="fN" placeholder="e.g. John Doe">
        </div>
        <div class="fg">
          <label class="fl">Phone Number</label>
          <input class="fi" id="fPh" placeholder="+1 555 000 0000">
        </div>
        <div class="fg">
          <label class="fl">Last Purchase Date</label>
          <input class="fi" id="fD" type="date">
        </div>
        <div class="fg full">
          <label class="fl">Address</label>
          <input class="fi" id="fA" placeholder="123 Main St, City, State">
        </div>
        <div class="fg">
          <label class="fl">Shipping Charges (₹)</label>
          <input class="fi" id="fSC" type="number" placeholder="0" min="0" step="1">
        </div>
      </div>
      <button class="btn-save" id="mBtn" onclick="submitClient()">Add Client</button>
    </div>
  </div>

  <!-- ─ History Overlay ─ -->
  <div class="hov" id="hOv">
    <div class="hmod">
      <button class="xbtn" style="position:absolute;top:14px;right:14px;z-index:10"
        onclick="closeModal('hOv')">&times;</button>

      <!-- Header -->
      <div class="hhead">
        <div class="hclient">
          <div class="hav" id="hAv"></div>
          <div>
            <div class="hname" id="hNm"></div>
            <div class="hphone" id="hPh"></div>
            <div class="haddr" id="hAd"></div>
            <div class="haddr" id="hSC" style="color:var(--txt2); margin-top:2px;"></div>
          </div>
        </div>
        <div class="hstats">
          <div class="hs">
            <div class="hs-v b" id="hOrds">0</div>
            <div class="hs-l">Orders</div>
          </div>
          <div class="hs">
            <div class="hs-v g" id="hSpent">₹0</div>
            <div class="hs-l">Total Spent</div>
          </div>
          <div class="hs">
            <div class="hs-v go" id="hAvg">₹0</div>
            <div class="hs-l">Avg Order</div>
          </div>
          <div class="hs">
            <div class="hs-v" id="hLast" style="font-size:13px;color:var(--txt2)">—</div>
            <div class="hs-l">Last Date</div>
          </div>
        </div>
      </div>

      <!-- Add Purchase -->
      <div class="addp-wrap">
        <button class="addp-toggle" onclick="togglePF()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" />
          </svg>
          Record New Purchase
        </button>
        <div class="addp-form" id="pForm">
          <div class="fg">
            <label class="fl">Product / Service</label>
            <input class="fi" id="pProd" placeholder="e.g. MacBook Pro">
          </div>
          <div class="fg">
            <label class="fl">Qty</label>
            <input class="fi" id="pQty" type="number" placeholder="1" min="1" value="1">
          </div>
          <div class="fg">
            <label class="fl">Price / Unit (₹)</label>
            <input class="fi" id="pPrice" type="number" placeholder="0" min="0" step="1">
          </div>
          <div class="fg">
            <label class="fl">Date</label>
            <input class="fi" id="pDate" type="date">
          </div>
          <button class="btn-ap" onclick="addPurchase()">Save</button>
        </div>
      </div>

      <!-- Purchase list -->
      <div class="hbody" id="hBody"></div>
    </div>
  </div>

  <script>
    // ── storage ──
    const supaUrl = 'https://nxkdcukkdezdzzmtjjyu.supabase.co';
    const supaKey = 'sb_publishable_sv9SMiWmpxz8_mjRL_vVcA_9TQKkZIq';
    const supabase = window.supabase.createClient(supaUrl, supaKey);

    let clients = [];
    let editId = null, curHid = null;

    async function initDb() {
      const { data, error } = await supabase.from('clients').select('*');
      if (error) {
        console.error('Error loading Supabase data:', error);
      } else if (data && data.length > 0) {
        clients = data;
      } else {
        const local = JSON.parse(localStorage.getItem('cv2_clients') || 'null');
        if (local && local.length > 0) {
          clients = local;
          save(); // migrate to cloud
        }
      }
      render();
    }
    initDb();

    async function save() {
      if(!clients.length) return;
      const { error } = await supabase.from('clients').upsert(clients);
      if (error) console.error('Supabase Save Error:', error);
    }
    function uid() { return Date.now() + Math.floor(Math.random() * 9999); }
    function avCls(id) { return 'av' + (id % 6); }
    function initials(n) { return n.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
    function fmtD(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      const ms = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return `${ms[+m - 1]} ${+day}, ${y}`;
    }
    function fmtM(n) { return '₹' + Math.round(Number(n)).toLocaleString('en-IN'); }
    function totalSpent(c) {
      let sum = c.purchases.reduce((s, p) => s + p.qty * p.price, 0);
      if (c.shippingCharges) {
        const uDates = new Set(c.purchases.map(p => p.date)).size;
        sum -= (c.shippingCharges * uDates);
      }
      return sum;
    }

    // ── stats ──
    function updateStats() {
      document.getElementById('sC').textContent = clients.length;
      let rev = 0, pc = 0;
      clients.forEach(c => {
        let cRev = 0;
        c.purchases.forEach(p => { cRev += p.qty * p.price; pc++; });
        if (c.shippingCharges) {
          const uDates = new Set(c.purchases.map(p => p.date)).size;
          cRev -= (c.shippingCharges * uDates);
        }
        rev += cRev;
      });
      document.getElementById('sR').textContent = '₹' + Math.round(rev).toLocaleString('en-IN');
      document.getElementById('sP').textContent = pc;
    }

    // ── render table ──
    function render(q = '') {
      q = q.trim().toLowerCase();
      const list = q
        ? clients.filter(c => c.name.toLowerCase().includes(q) || c.phone.replace(/\D/g, '').includes(q.replace(/\D/g, '')))
        : clients;

      const tb = document.getElementById('tbody');
      document.getElementById('rCount').textContent = list.length + ' client' + (list.length !== 1 ? 's' : '');
      document.getElementById('empty').style.display = list.length ? 'none' : 'block';

      function hl(s) {
        if (!q) return s;
        return s.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<span class="hl">$1</span>');
      }

      tb.innerHTML = list.map(c => {
        const ac = avCls(c.id), ini = initials(c.name);
        const spent = totalSpent(c);
        return `<tr>
      <td>
        <div class="client-cell">
          <div class="av ${ac}">${ini}</div>
          <div>
            <div class="cname">${hl(c.name)}</div>
            <div class="cphone">${hl(c.phone)}</div>
            <div class="caddr">${c.address || ''}</div>
          </div>
        </div>
      </td>
      <td>
        <button class="date-btn" onclick="openHistory(${c.id})">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          ${fmtD(c.lastPurchase)}
        </button>
      </td>
      <td style="font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--green)">${fmtM(spent)}</td>
      <td>
        <div class="acts">
          <button class="ibtn e" title="Edit" onclick="openEdit(${c.id})">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/>
            </svg>
          </button>
          <button class="ibtn d" title="Delete Client" onclick="deleteClient(${c.id})">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
      </td>
    </tr>`;
      }).join('');

      updateStats();
    }

    // ── search ──
    document.getElementById('srch').addEventListener('input', e => render(e.target.value));
    document.getElementById('srch').addEventListener('keydown', e => { if (e.key === 'Escape') { e.target.value = ''; render(); } });

    // ── client modal ──
    function openAdd() {
      editId = null;
      document.getElementById('mTitle').textContent = 'Add New Client';
      document.getElementById('mBtn').textContent = 'Add Client';
      ['fN', 'fPh', 'fA', 'fSC'].forEach(i => document.getElementById(i).value = '');
      document.getElementById('fD').value = '';
      document.getElementById('cModal').classList.add('on');
    }
    function openEdit(id) {
      const c = clients.find(x => x.id === id); if (!c) return;
      editId = id;
      document.getElementById('mTitle').textContent = 'Edit Client';
      document.getElementById('mBtn').textContent = 'Save Changes';
      document.getElementById('fN').value = c.name;
      document.getElementById('fPh').value = c.phone;
      document.getElementById('fD').value = c.lastPurchase || '';
      document.getElementById('fA').value = c.address || '';
      document.getElementById('fSC').value = c.shippingCharges || '';
      document.getElementById('cModal').classList.add('on');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('on'); }

    function submitClient() {
      const name = document.getElementById('fN').value.trim();
      const phone = document.getElementById('fPh').value.trim();
      const date = document.getElementById('fD').value;
      const addr = document.getElementById('fA').value.trim();
      const shippingCharges = parseFloat(document.getElementById('fSC').value) || 0;
      if (!name || !phone) { alert('Name and phone are required.'); return; }
      if (editId) {
        const c = clients.find(x => x.id === editId);
        Object.assign(c, { name, phone, lastPurchase: date, address: addr, shippingCharges });
      } else {
        clients.unshift({ id: uid(), name, phone, address: addr, lastPurchase: date, shippingCharges, purchases: [] });
      }
      save(); closeModal('cModal'); render(document.getElementById('srch').value);
    }

    function deleteClient(id) {
      if (!confirm('Delete this client and ALL their purchase history? This cannot be undone.')) return;
      clients = clients.filter(c => c.id !== id);
      supabase.from('clients').delete().eq('id', id).then(() => render(document.getElementById('srch').value));
      render(document.getElementById('srch').value);
    }

    // ── history ──
    function openHistory(id) {
      curHid = id;
      document.getElementById('pForm').classList.remove('open');
      ['pProd', 'pQty', 'pPrice'].forEach(i => {
        const el = document.getElementById(i);
        el.value = i === 'pQty' ? '1' : '';
      });
      const c = clients.find(x => x.id === id);
      document.getElementById('pDate').value = c.lastPurchase || new Date().toISOString().split('T')[0];

      renderHistory();
      document.getElementById('hOv').classList.add('on');
    }

    function renderHistory() {
      const c = clients.find(x => x.id === curHid); if (!c) return;
      const ac = avCls(c.id), ini = initials(c.name);

      document.getElementById('hAv').className = 'hav ' + ac;
      document.getElementById('hAv').textContent = ini;
      document.getElementById('hNm').textContent = c.name;
      document.getElementById('hPh').textContent = c.phone;
      document.getElementById('hAd').textContent = c.address || '';
      document.getElementById('hSC').textContent = c.shippingCharges ? 'Shipping Charges: ' + fmtM(c.shippingCharges) : '';

      const ps = c.purchases || [];
      let total = ps.reduce((s, p) => s + p.qty * p.price, 0);
      if (c.shippingCharges) {
        const uDates = new Set(ps.map(p => p.date)).size;
        total -= (c.shippingCharges * uDates);
      }
      const avg = ps.length ? total / ps.length : 0;
      const sorted = [...ps].sort((a, b) => b.date.localeCompare(a.date));
      const lastD = sorted.length ? fmtD(sorted[0].date) : '—';

      document.getElementById('hOrds').textContent = ps.length;
      document.getElementById('hSpent').textContent = fmtM(total);
      document.getElementById('hAvg').textContent = fmtM(avg);
      document.getElementById('hLast').textContent = lastD;

      const body = document.getElementById('hBody');
      if (!ps.length) {
        body.innerHTML = '<div class="no-p">No purchases recorded yet.<br>Click <strong>Record New Purchase</strong> to add one.</div>';
        return;
      }

      body.innerHTML = `
    <table class="ptable">
      <thead>
        <tr>
          <th>#</th>
          <th>Product / Service</th>
          <th>Date</th>
          <th>Qty</th>
          <th>Unit Price</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map((p, i) => `
          <tr>
            <td><div class="p-num">${sorted.length - i}</div></td>
            <td><div class="p-prod">${p.product}</div></td>
            <td><div class="p-date">${fmtD(p.date)}</div></td>
            <td><span class="p-qty">${p.qty}</span></td>
            <td class="p-price">${fmtM(p.price)}</td>
            <td class="p-total">${fmtM(p.qty * p.price)}</td>
            <td>
              <button class="p-del" onclick="deletePurchase(${p.id})" title="Delete this purchase">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
                </svg>
              </button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
    }

    function togglePF() {
      const f = document.getElementById('pForm');
      f.classList.toggle('open');
      if (f.classList.contains('open')) document.getElementById('pProd').focus();
    }

    function addPurchase() {
      const prod = document.getElementById('pProd').value.trim();
      const qty = parseInt(document.getElementById('pQty').value) || 1;
      const price = parseFloat(document.getElementById('pPrice').value);
      const dateVal = document.getElementById('pDate').value;
      if (!prod || isNaN(price) || price < 0) { alert('Please fill in product, qty, and price.'); return; }

      const c = clients.find(x => x.id === curHid);
      const formDate = dateVal || new Date().toISOString().split('T')[0];
      c.purchases.push({ id: uid(), product: prod, qty, price, date: formDate });

      const s = [...c.purchases].sort((a, b) => b.date.localeCompare(a.date));
      c.lastPurchase = s.length ? s[0].date : '';

      document.getElementById('pProd').value = '';
      document.getElementById('pQty').value = '1';
      document.getElementById('pPrice').value = '';
      document.getElementById('pDate').value = c.lastPurchase || formDate;
      document.getElementById('pForm').classList.remove('open');

      save(); renderHistory(); render(document.getElementById('srch').value);
    }

    function deletePurchase(pid) {
      if (!confirm('Remove this purchase entry?')) return;
      const c = clients.find(x => x.id === curHid);
      c.purchases = c.purchases.filter(p => p.id !== pid);
      const s = [...c.purchases].sort((a, b) => b.date.localeCompare(a.date));
      c.lastPurchase = s.length ? s[0].date : '';
      save(); renderHistory(); render(document.getElementById('srch').value);
    }

    // close on backdrop
    document.getElementById('cModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('cModal'); });
    document.getElementById('hOv').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('hOv'); });

  </script>
</body>

</html>
